<!DOCTYPE html>

<head>

<body>

    <form>
    <label>Nome</label>
    <input type="text" required>

    <label>WhatsApp</label>
    <input type="tel" required>

    <label>Produto</label>
    <select>
        <option>Bolos decorados</option>
        <option>Bolos de Pote</option>
        <option>Empadão</option>
    </select>

    <label>Quantidade</label>
    <input type="number" min="1" value="1">

    <label>Detalhes</label>
    <textarea></textarea>

    <button type="submit">Enviar Pedido</button>
</form>
<script>
function enviarWhatsApp(event) {
    event.preventDefault();

    // Pegando os valores do formulário
    const nome = document.getElementById("nome").value;
    const telefone = document.getElementById("telefone").value;
    const produto = document.getElementById("produto").value;
    const quantidade = document.getElementById("quantidade").value;
    const detalhes = document.getElementById("detalhes").value;

    // Montando a mensagem
    const mensagem =
        `Olá! Gostaria de fazer um pedido:\n\n` +
        `Nome: ${nome}\n` +
        `WhatsApp: ${telefone}\n` +
        `Produto: ${produto}\n` +
        `Quantidade: ${quantidade}\n` +
        `Detalhes: ${detalhes}`;

    // Número da doceira (trocar pelo seu)
    const numero = "5511973126001";

    // Abrindo WhatsApp
    const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;
    window.open(url, "_blank");
}
<form onsubmit="enviarWhatsApp(event)">

<label>Nome</label>
<input id="nome" type="text" required>

<label>WhatsApp</label>
<input id="telefone" type="tel" required>

<label>Produto</label>
<select id="produto">
    <option>Bolo decorado</option>
    <option>Bolo de Pote</option>
    <option>Empadão</option>
</select>

<label>Quantidade</label>
<input id="quantidade" type="number" min="1" value="1">

<label>Detalhes</label>
<textarea id="detalhes"></textarea>
</script>
    
    <div vw class="enabled">

    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
